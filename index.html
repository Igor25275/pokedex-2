<!DOCTYPE html>
<html lang="en">
<head>

    <!-- font awesome -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/style/global.css">
    <link rel="stylesheet" href="assets/style/index.css">

    <title>Pokedex</title>
</head>
<body>

    <div id="container">

        <!-- cabeçalho da pagina onde constém o titulo-->
        <header>
            <h1>Pokédex</h1>

            <nav>
                <a href="pages/team.html">Equipe</a>
            </nav>
        </header>


        <!-- Main contendo o input e o card para o pokémon-->
        <main>
            <div class="input_pokemon">
                <p>Procurar Pokémon ( nome ou ID )</p>

                <!--Formulario com input e button 
                    usei o event.preventDefault para não ficar atualizando a pagina quando clicar no botão.
                -->
                <form action="" onsubmit="event.preventDefault()">
                    <input type="text" class="format" id="search" placeholder="pikachu or 25">
                    <button class="format btn_search" onclick="buscar_pokemon()">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </form>
                
            </div>

            <!-- 
                Card do pokemon -
                Inicializa com a imagem de um personagem jogando uma pokébola.
                e quando o usuario faz a pesquisa, aparece o pokémon pesquisado e seus atributos
                HP, ATTACK e DEFENSE
             -->
            <div class="card_pokemon">
                <!-- Div com tag img onde carrega as imagens dos pokémons-->
                <div class="img">
                    <h3 id="tittle"></h3>
                    <img src="assets/img/i_choose_you.png" alt="Um desenho de um  menino na cor preto e branco jogando uma bola de pokémon branca e vermelha" id="img_pokemon">

                </div>

                <!-- Div de descrição com o nome, tipo, hp, attack e defense-->
                <div class="description">
                    <p id="name"></p>
                    <p id="type"></p>

                    <p id="hp"></p>
                    <p id="attack"></p>
                    <p id="defense"></p>
                </div>

                <!-- Div que contém o botão para adicionar o pokémon -->
                <div class="description add">
                    <button class="btn_add" id="btn_add_pokemon">
                        <i class="fa-solid fa-user-plus"></i>
                        Adicionar a equipe
                    </button>
                    
                </div>
                
            </div>
            
        </main>

        <div id="teste_pokemon">

        </div>
        
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
